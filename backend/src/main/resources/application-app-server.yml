spring:
  application:
    name: rpg-forge-app-server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${APP_AUTH_SERVER_ISSUER:http://localhost:9000}

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    issuer: ${APP_SECURITY_ISSUER:${APP_AUTH_SERVER_ISSUER:http://localhost:9000}}
